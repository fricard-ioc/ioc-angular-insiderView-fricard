<div class="graella" *ngIf="elements.length > 0; else emptyList">
  <app-targeta-element *ngFor="let item of elements; trackBy: trackById"
                       [element]="item">
  </app-targeta-element>
</div>

<ng-template #emptyList>
  <div class="empty-message">
    <p>Sense resultats per a la cerca.</p>
  </div>
</ng-template>
