<div *ngIf="elements.length > 0; else emptyList">

  <cdk-virtual-scroll-viewport [itemSize]="altadaElement" style="height: 500px;">
    <div *cdkVirtualFor="let element of elements" class="card-container">
      <app-targeta-element [element]="element"></app-targeta-element>
    </div>
  </cdk-virtual-scroll-viewport>

</div>

<ng-template #emptyList>
  <div class="empty-message">
    <p>Sense resultats per a la cerca.</p>
  </div>
</ng-template>
