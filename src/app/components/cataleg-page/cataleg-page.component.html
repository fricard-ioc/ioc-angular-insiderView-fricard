<div class="container">
  <h1>La meva Cartera d'Inversions</h1>

  <div *ngIf="elementService.carregant()" class="loading-container">
    <div class="spinner"></div>
    <p>Carregant dades del mercat...</p>
  </div>

  <div *ngIf="elementService.error() && !elementService.carregant()" class="error-container">
    <div class="error-message">
      <p>⚠️ {{ elementService.error() }}</p>
      <button (click)="reintentar()" class="btn-reintentar">Reintentar</button>
    </div>
  </div>

  <div *ngIf="!elementService.carregant() && !elementService.error()">
    <app-llista-elements [elements]="elementService.elements()"></app-llista-elements>
  </div>
</div>
